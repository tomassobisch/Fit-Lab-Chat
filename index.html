<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TJOffice | Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <body style="margin: 0; background-color: #121212;">
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: white;">
        <h1 style="color: #CCFF00; font-size: 24px; letter-spacing: -1px; font-weight: 800; margin-bottom: 20px;">
          TJ<span style="text-decoration: underline; text-underline-offset: 4px;">OFFICE</span>

        <div style="width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: #CCFF00; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 500;">INICIALIZANDO ESPACIO DE TRABAJO...</p>
      </div>
    </div>
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script type="module" src="/src/main.tsx"></script>
